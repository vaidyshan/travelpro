apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travelpro
  template:
    metadata:
      labels:
        app: travelpro
    spec:
      containers:
        - name: travelpro
          image: travelpro:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: travelpro
spec:
  type: NodePort
  selector:
    app: travelpro
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
